<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alaya Studio</title>
    <link rel="icon" type="image/png" href="static/images/logo.png">
    <meta property="og:title" content="Alaya Studio">
    <meta property="og:description" content="Research on generative world rendering.">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --accent: #b7a5ff;
            --bg: #05020b;
            --text: rgba(255,255,255,0.78);
            --text-dim: rgba(255,255,255,0.4);
            --border: rgba(255,255,255,0.08);
            --font: "Inter Tight", ui-sans-serif, system-ui, sans-serif;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: var(--font);
            color: var(--text);
            background: var(--bg);
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
        }

        a { color: var(--accent); text-decoration: none; }

        .page {
            max-width: 720px;
            margin: 0 auto;
            padding: 10vh 24px 8vh;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .site-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 48px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-nav {
            display: flex;
            gap: 8px;
        }

        .header-nav a {
            padding: 6px 16px;
            color: #fff;
            font-size: 13px;
            font-weight: 500;
            border-radius: 80px;
            border: 1px solid transparent;
            background: rgba(255, 255, 255, 0.05);
            transition: all 0.2s ease;
            font-family: "Space Grotesk", sans-serif;
            text-decoration: none;
        }

        .header-nav a:hover {
            color: var(--accent);
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.08);
        }

        .header-icon {
            color: rgba(255, 255, 255, 0.6);
            font-size: 18px;
            transition: color 0.2s ease;
        }

        .header-icon:hover {
            color: #fff;
        }

        .logo-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-row img {
            height: 32px;
            width: auto;
            padding: 5px;
            background: var(--accent);
            border-radius: 6px;
        }

        .logo-row span {
            font-family: "Segoe UI", var(--font);
            font-size: 18px;
            letter-spacing: 0.08em;
            color: var(--accent);
        }

        .logo-row .bold { font-weight: 700; }
        .logo-row .light { font-weight: 300; }

        h1 {
            font-size: clamp(2rem, 5vw, 3.2rem);
            font-weight: 700;
            color: #fff;
            line-height: 1.1;
            margin-bottom: 16px;
        }

        h1 .accent { color: var(--accent); }

        .tagline {
            font-size: 16px;
            color: var(--text-dim);
            margin-bottom: 56px;
            max-width: 480px;
        }

        .works {
            display: grid;
            gap: 16px;
            flex: 1;
        }

        .work-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 28px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.03);
            transition: border-color 0.25s, background 0.25s, transform 0.25s;
            text-decoration: none;
            color: inherit;
        }

        .work-card:hover {
            border-color: var(--accent);
            background: rgba(183,165,255,0.06);
            transform: translateY(-2px);
        }

        .work-info h2 {
            font-size: 20px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 4px;
        }

        .work-info p {
            font-size: 14px;
            color: var(--text-dim);
            line-height: 1.5;
        }

        .work-tag {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 4px 12px;
            border-radius: 50px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .work-tag--new {
            background: rgba(183,165,255,0.15);
            color: var(--accent);
        }

        .work-tag--soon {
            background: rgba(255,255,255,0.06);
            color: var(--text-dim);
        }

        footer {
            margin-top: 64px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
            font-size: 13px;
            color: var(--text-dim);
        }

        @media (max-width: 600px) {
            .work-card { padding: 18px 20px; }
            .work-info h2 { font-size: 17px; }
            .header-nav { display: none; }
        }
    </style>
</head>
<body>
    <div class="page">
        <header class="site-header">
            <a class="logo-row" href="https://alaya-studio.github.io">
                <img src="static/images/logo.png" alt="Alaya Studio">
                <span><span class="bold">ALAYA</span> <span class="light">STUDIO</span></span>
            </a>
            <div class="header-right">
                <nav class="header-nav">
                    <a href="https://alaya-studio.github.io">HOME</a>
                    <a href="">Join Us</a>
                </nav>
                <a href="https://github.com/ShandaAI" class="header-icon"><i class="fab fa-github"></i></a>
                <a href="https://x.com/alayastd" class="header-icon"><i class="fab fa-x-twitter"></i></a>
            </div>
        </header>

        <h1>Building frontier world model for <span class="accent">next-generation game</span></h1>
        <!-- <p class="tagline">We work on next-generation world model.</p> -->

        <div class="works">
            <a class="work-card" href="https://alaya-studio.github.io/renderer/">
                <div class="work-info">
                    <h2>Generative World Renderer</h2>
                    <p>Dataset, SOTA model, tool, benchmark and applications.</p>
                </div>
                <span class="work-tag work-tag--new">New</span>
            </a>

            <a class="work-card" href="https://shandaai.github.io/wildworld-project/">
                <div class="work-info">
                    <h2>WildWorld</h2>
                    <p>Dataset, benchmark.</p>
                </div>
                <span class="work-tag work-tag--new">New</span>
            </a>

            <a class="work-card" href="https://github.com/ShandaAI/PackForcing">
                <div class="work-info">
                    <h2>PackForcing</h2>
                    <p>SOTA model.</p>
                </div>
                <span class="work-tag work-tag--new">New</span>
            </a>
        </div>

        <footer>Powered by Shanda AI Research Tokyo</footer>
    </div>
</body>
</html>
